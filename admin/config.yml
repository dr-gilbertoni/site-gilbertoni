backend:
  name: git-gateway
  repo: dr-gilbertoni/site-gilbertoni
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "posts"
    label: "Artigos"
    folder: "posts"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Título do Artigo", name: "title", widget: "string"}
      - {label: "Data de Publicação", name: "date", widget: "datetime"}
      - {label: "Categoria", name: "category", widget: "select", options: ["eSocial & Legislação", "Segurança do Trabalho", "Medicina do Trabalho"]}
      - {label: "Resumo do Artigo (Para o Grid)", name: "summary", widget: "text"}
      - {label: "Imagem de Capa (URL ou Upload)", name: "image", widget: "image", required: false}
      - {label: "Corpo do Texto", name: "body", widget: "markdown"}

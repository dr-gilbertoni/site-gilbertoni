<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artigo | Clínica Gilbertoni</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        /* Estilização para o texto do artigo convertido do Markdown */
        .prose h1 { @apply text-3xl font-bold text-sky-950 mt-6 mb-4; }
        .prose h2 { @apply text-2xl font-bold text-sky-950 mt-5 mb-3; }
        .prose h3 { @apply text-xl font-bold text-sky-950 mt-4 mb-2; }
        .prose p { @apply text-slate-600 leading-relaxed mb-4 text-base; }
        .prose ul { @apply list-disc list-inside mb-4 text-slate-600 space-y-1; }
        .prose ol { @apply list-decimal list-inside mb-4 text-slate-600 space-y-1; }
        .prose strong { @apply text-slate-800 font-semibold; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">

    <header class="bg-white border-b border-slate-100 py-4 px-6 sticky top-0 z-40 shadow-sm">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <a href="/" class="text-sky-900 font-bold flex items-center gap-2 hover:text-emerald-500 transition-colors">
                <i class="fa-solid fa-arrow-left"></i> Voltar para o Início
            </a>
            <span class="text-xs text-emerald-600 font-medium uppercase tracking-widest">Clínica Gilbertoni</span>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-6 py-12">
        <article id="post-content" class="bg-white rounded-2xl p-6 md:p-10 shadow-lg border border-slate-100">
            <div id="loader" class="flex flex-col items-center justify-center py-20 space-y-4">
                <div class="animate-spin text-emerald-500 text-4xl"><i class="fa-solid fa-circle-notch"></i></div>
                <p class="text-slate-500 text-sm">Carregando conteúdo...</p>
            </div>
        </article>
    </main>

    <script>
        async function loadArticle() {
            const container = document.getElementById('post-content');
            
            // Pega o nome do arquivo da URL (ex: ?post=teste-post-decap)
            const urlParams = new URLSearchParams(window.location.search);
            const postName = urlParams.get('post');

            if (!postName) {
                container.innerHTML = `<h1 class="text-2xl font-bold text-red-500 text-center">Artigo não especificado.</h1>`;
                return;
            }

            const owner = 'dr-gilbertoni';
            const repo = 'site-gilbertoni';
            const filePath = `posts/${postName}.md`;

            try {
                // Busca o arquivo md direto do repositório
                const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${filePath}`);
                if (!response.ok) throw new Error("Post não encontrado");

                const fileData = await response.json();
                // Decodifica o conteúdo Base64 retornado pela API do GitHub
                const rawMarkdown = decodeURIComponent(escape(atob(fileData.content)));

                // Separa o cabeçalho (meta-dados) do corpo do texto
                const frontMatterMatch = rawMarkdown.match(/^---([\s\S]*?)---([\s\S]*)$/);
                let title = postName;
                let bodyMarkdown = rawMarkdown;
                let image = '';
                let category = 'Medicina do Trabalho';

                if (frontMatterMatch) {
                    const metadataLines = frontMatterMatch[1].split('\n');
                    const metadata = {};
                    metadataLines.forEach(line => {
                        const parts = line.split(':');
                        if (parts.length >= 2) {
                            metadata[parts[0].trim()] = parts.slice(1).join(':').trim().replace(/^['"]|['"]$/g, '');
                        }
                    });

                    title = metadata.title || title;
                    image = metadata.image || '';
                    category = metadata.category || category;
                    bodyMarkdown = frontMatterMatch[2];
                }

                // Converte markdown do corpo para HTML
                const bodyHTML = marked.parse(bodyMarkdown);

                // Renderiza na página
                container.innerHTML = `
                    <span class="bg-emerald-500 text-white text-xs uppercase font-extrabold px-2.5 py-1 rounded inline-block mb-4">${category}</span>
                    <h1 class="text-3xl md:text-4xl font-extrabold text-sky-950 mb-6 leading-tight">${title}</h1>
                    
                    ${image ? `<div class="rounded-xl overflow-hidden mb-8 shadow-sm max-h-[400px] flex items-center justify-center"><img src="${image}" alt="${title}" class="w-full object-cover"></div>` : ''}
                    
                    <div class="prose max-w-none">
                        ${bodyHTML}
                    </div>
                `;

            } catch (err) {
                console.error(err);
                container.innerHTML = `
                    <div class="text-center py-12">
                        <i class="fa-solid fa-triangle-exclamation text-rose-500 text-5xl mb-4"></i>
                        <h1 class="text-2xl font-bold text-sky-950 mb-2">Artigo Não Encontrado</h1>
                        <p class="text-slate-500 text-sm max-w-md mx-auto">O artigo solicitado pode ter sido excluído ou alterado no painel administrativo.</p>
                        <a href="/" class="mt-6 inline-block bg-sky-900 text-white px-6 py-2 rounded-lg font-bold text-sm hover:bg-sky-950 transition-all">Voltar para Home</a>
                    </div>
                `;
            }
        }

        window.addEventListener('DOMContentLoaded', loadArticle);
    </script>
</body>
</html>
